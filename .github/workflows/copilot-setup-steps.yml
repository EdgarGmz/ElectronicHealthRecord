name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin1234
          POSTGRES_DB: ehr_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d ehr_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s

    permissions:
      contents: read

    env:
      DATABASE_URL: postgresql://admin:admin1234@localhost:5432/ehr_db
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        working-directory: api
        run: npm ci

      - name: Prisma generate & migrate
        working-directory: api
        run: npx prisma generate && npx prisma migrate deploy

      - name: Seed database
        working-directory: api
        run: npm run prisma:seed

      - name: Install Kiosko dependencies
        working-directory: Kiosko
        run: npm ci

      - name: Install ut-care dependencies
        working-directory: ut-care
        run: npm ci
