openapi: 3.0.3
info:
  title: Electronic Health Record API
  description: |
    Sistema integral de gestión de registros de salud electrónicos para departamentos de enfermería y psicología.
    
    ## Características
    - Gestión completa de expedientes médicos
    - Sistema de citas y agendamiento
    - Control de medicamentos y prescripciones
    - Seguimiento de sesiones terapéuticas
    - Interconsultas entre departamentos
    - Reportes y estadísticas
    - Auditoría completa de acciones
    
    ## Autenticación
    La API utiliza JWT (JSON Web Tokens) para autenticación. Incluya el token en el header Authorization:
    ```
    Authorization: Bearer <token>
    ```
    
    ## Roles de Usuario
    - **admin**: Administrador del sistema con acceso completo
    - **psychologist**: Psicólogo con acceso a expedientes y sesiones terapéuticas
    - **nurse**: Enfermero/a con acceso a medicamentos y procedimientos
    - **doctor**: Médico general con acceso a expedientes médicos
    - **receptionist**: Recepcionista con acceso a citas y datos básicos de pacientes
    
  version: 1.0.0
  contact:
    name: EHR System Support
    email: support@ehr-system.com
  license:
    name: Proprietary
    
servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: https://staging-api.ehr-system.com/api
    description: Staging server
  - url: https://api.ehr-system.com/api
    description: Production server

tags:
  - name: Authentication
    description: Endpoints de autenticación y autorización
  - name: Students
    description: Gestión de estudiantes (pacientes con número de matrícula)
  - name: Patients
    description: Gestión de pacientes y expedientes básicos
  - name: Medical Records
    description: Expedientes médicos completos
  - name: Appointments
    description: Sistema de citas y agendamiento
  - name: Medications
    description: Gestión de medicamentos y prescripciones
  - name: Therapy Sessions
    description: Registro y seguimiento de sesiones terapéuticas
  - name: Psychometric Tests
    description: Evaluaciones psicométricas
  - name: Interconsultations
    description: Interconsultas entre departamentos
  - name: Reports
    description: Reportes y estadísticas
  - name: Audit Logs
    description: Logs de auditoría
  - name: Users
    description: Gestión de usuarios del sistema
  - name: Notifications
    description: Sistema de notificaciones

security:
  - bearerAuth: []

paths:
  # ==================== AUTHENTICATION ====================
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Iniciar sesión
      description: Autentica un usuario y retorna tokens JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: doctor@hospital.com
                password:
                  type: string
                  format: password
                  example: SecurePass123!
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      expiresIn:
                        type: integer
                        example: 604800
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Cerrar sesión
      description: Invalida el token actual del usuario
      responses:
        '200':
          description: Logout exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refrescar token
      description: Genera un nuevo access token usando el refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Token refrescado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      expiresIn:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Solicitar recuperación de contraseña
      description: Envía un email con link para resetear contraseña
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email enviado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Resetear contraseña
      description: Resetea la contraseña usando el token recibido por email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Contraseña reseteada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ==================== STUDENTS ====================
  /students:
    get:
      tags:
        - Students
      summary: Listar estudiantes
      description: |
        Obtiene lista paginada de estudiantes (pacientes con número de matrícula).
        Soporta búsqueda por nombre, email y número de matrícula, y filtrado por carrera.
      parameters:
        - name: page
          in: query
          description: Número de página (por defecto 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Cantidad de resultados por página (máximo 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: search
          in: query
          description: Búsqueda por nombre, email o número de matrícula
          schema:
            type: string
            example: "John"
        - name: careerId
          in: query
          description: Filtrar por carrera (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de estudiantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Students retrieved successfully"
                  data:
                    type: object
                    properties:
                      students:
                        type: array
                        items:
                          $ref: '#/components/schemas/Student'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /students/{id}:
    get:
      tags:
        - Students
      summary: Obtener estudiante por ID
      description: Obtiene información detallada de un estudiante específico incluyendo datos personales, carrera y contactos de emergencia
      parameters:
        - name: id
          in: path
          required: true
          description: ID del estudiante (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalles del estudiante
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Student retrieved successfully"
                  data:
                    $ref: '#/components/schemas/StudentDetails'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== PATIENTS ====================
  /patients:
    get:
      tags:
        - Patients
      summary: Listar pacientes
      description: Obtiene lista paginada de pacientes con filtros opcionales
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Order'
        - name: search
          in: query
          description: Búsqueda por nombre, matrícula o síntomas
          schema:
            type: string
        - name: status
          in: query
          description: Filtrar por estado
          schema:
            type: string
            enum: [active, inactive, discharged]
      responses:
        '200':
          description: Lista de pacientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Patient'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Patients
      summary: Registrar nuevo paciente
      description: Crea un nuevo registro de paciente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientInput'
      responses:
        '201':
          description: Paciente creado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Patient'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'

  /patients/{id}:
    get:
      tags:
        - Patients
      summary: Obtener paciente por ID
      description: Retorna información detallada de un paciente
      parameters:
        - $ref: '#/components/parameters/PatientId'
      responses:
        '200':
          description: Datos del paciente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Patient'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Patients
      summary: Actualizar paciente
      description: Actualiza información del paciente
      parameters:
        - $ref: '#/components/parameters/PatientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientInput'
      responses:
        '200':
          description: Paciente actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Patient'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Patients
      summary: Eliminar paciente
      description: Elimina lógicamente un paciente (soft delete)
      parameters:
        - $ref: '#/components/parameters/PatientId'
      responses:
        '200':
          description: Paciente eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== MEDICAL RECORDS ====================
  /medical-records:
    get:
      tags:
        - Medical Records
      summary: Listar expedientes médicos
      description: Obtiene lista de expedientes médicos
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: patientId
          in: query
          description: Filtrar por ID de paciente
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de expedientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MedicalRecord'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Medical Records
      summary: Crear expediente médico
      description: Crea un nuevo expediente médico para un paciente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalRecordInput'
      responses:
        '201':
          description: Expediente creado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MedicalRecord'

  /medical-records/{id}:
    get:
      tags:
        - Medical Records
      summary: Obtener expediente médico
      description: Retorna expediente médico completo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expediente médico
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MedicalRecord'

    put:
      tags:
        - Medical Records
      summary: Actualizar expediente médico
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicalRecordInput'
      responses:
        '200':
          description: Expediente actualizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MedicalRecord'

  /medical-records/{id}/diagnoses:
    post:
      tags:
        - Medical Records
      summary: Agregar diagnóstico
      description: Agrega un nuevo diagnóstico al expediente (DSM-5 o CIE-10/11)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosisInput'
      responses:
        '201':
          description: Diagnóstico agregado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Diagnosis'

  # ==================== APPOINTMENTS ====================
  /appointments:
    get:
      tags:
        - Appointments
      summary: Listar citas
      description: Obtiene lista de citas con filtros
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: date
          in: query
          description: Filtrar por fecha
          schema:
            type: string
            format: date
        - name: status
          in: query
          description: Filtrar por estado
          schema:
            type: string
            enum: [scheduled, completed, cancelled, no-show]
        - name: type
          in: query
          description: Filtrar por tipo de consulta
          schema:
            type: string
            enum: [psychology, nursing, general]
        - name: professionalId
          in: query
          description: Filtrar por profesional
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de citas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Appointments
      summary: Agendar cita
      description: Crea una nueva cita
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInput'
      responses:
        '201':
          description: Cita agendada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Appointment'

  /appointments/{id}:
    get:
      tags:
        - Appointments
      summary: Obtener cita por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalles de la cita
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Appointment'

    put:
      tags:
        - Appointments
      summary: Actualizar/Reprogramar cita
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentInput'
      responses:
        '200':
          description: Cita actualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Appointment'

    delete:
      tags:
        - Appointments
      summary: Cancelar cita
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cita cancelada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /appointments/availability:
    get:
      tags:
        - Appointments
      summary: Consultar disponibilidad
      description: Obtiene horarios disponibles para agendar
      parameters:
        - name: professionalId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [psychology, nursing, general]
      responses:
        '200':
          description: Horarios disponibles
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      date:
                        type: string
                        format: date
                      availableSlots:
                        type: array
                        items:
                          type: object
                          properties:
                            startTime:
                              type: string
                              format: time
                            endTime:
                              type: string
                              format: time
                            duration:
                              type: integer
                              description: Duración en minutos

  # ==================== MEDICATIONS ====================
  /medications:
    get:
      tags:
        - Medications
      summary: Listar medicamentos
      description: Catálogo de medicamentos disponibles
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: search
          in: query
          description: Búsqueda por nombre
          schema:
            type: string
      responses:
        '200':
          description: Lista de medicamentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Medication'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Medications
      summary: Registrar nuevo medicamento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicationInput'
      responses:
        '201':
          description: Medicamento registrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Medication'

  /prescriptions:
    get:
      tags:
        - Medications
      summary: Listar prescripciones
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: patientId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, cancelled]
      responses:
        '200':
          description: Lista de prescripciones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Prescription'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Medications
      summary: Crear prescripción
      description: Prescribe medicamento a un paciente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrescriptionInput'
      responses:
        '201':
          description: Prescripción creada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Prescription'

  /prescriptions/{id}/administrations:
    post:
      tags:
        - Medications
      summary: Registrar administración de medicamento
      description: Registra la administración de un medicamento con verificación de las 5 normas correctas
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MedicationAdministrationInput'
      responses:
        '201':
          description: Administración registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MedicationAdministration'

  # ==================== THERAPY SESSIONS ====================
  /therapy-sessions:
    get:
      tags:
        - Therapy Sessions
      summary: Listar sesiones terapéuticas
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: patientId
          in: query
          schema:
            type: string
            format: uuid
        - name: psychologistId
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [individual, group, family, couple]
      responses:
        '200':
          description: Lista de sesiones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TherapySession'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags:
        - Therapy Sessions
      summary: Registrar sesión terapéutica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TherapySessionInput'
      responses:
        '201':
          description: Sesión registrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/TherapySession'

  /therapy-sessions/{id}:
    get:
      tags:
        - Therapy Sessions
      summary: Obtener sesión por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalles de la sesión
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/TherapySession'

