# ==================== COMPONENTS ====================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtenido del endpoint /auth/login

  parameters:
    Page:
      name: page
      in: query
      description: Número de página
      schema:
        type: integer
        minimum: 1
        default: 1
    
    Limit:
      name: limit
      in: query
      description: Número de resultados por página
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    
    Sort:
      name: sort
      in: query
      description: Campo por el cual ordenar
      schema:
        type: string
    
    Order:
      name: order
      in: query
      description: Orden ascendente o descendente
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    
    PatientId:
      name: id
      in: path
      required: true
      description: ID único del paciente
      schema:
        type: string
        format: uuid

  schemas:
    # ==================== COMMON SCHEMAS ====================
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operación exitosa

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Error de validación
            details:
              type: array
              items:
                type: object

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 5
        totalItems:
          type: integer
          example: 95
        hasNext:
          type: boolean
          example: true
        hasPrev:
          type: boolean
          example: false

    # ==================== USER SCHEMAS ====================
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [admin, psychologist, nurse, doctor, receptionist]
        specialization:
          type: string
        licenseNumber:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - role
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [admin, psychologist, nurse, doctor, receptionist]
        specialization:
          type: string
        licenseNumber:
          type: string
        phone:
          type: string

    # ==================== PATIENT SCHEMAS ====================
    Patient:
      type: object
      properties:
        id:
          type: string
          format: uuid
        registrationNumber:
          type: string
          description: Matrícula del estudiante
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
        age:
          type: integer
        gender:
          type: string
          enum: [male, female, other]
        maritalStatus:
          type: string
          enum: [single, married, divorced, widowed]
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string
        emergencyContact:
          type: object
          properties:
            name:
              type: string
            relationship:
              type: string
            phone:
              type: string
        guardian:
          type: object
          properties:
            name:
              type: string
            relationship:
              type: string
            phone:
              type: string
        academicInfo:
          type: object
          properties:
            career:
              type: string
            group:
              type: string
            semester:
              type: integer
        occupation:
          type: string
        status:
          type: string
          enum: [active, inactive, discharged]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PatientInput:
      type: object
      required:
        - registrationNumber
        - firstName
        - lastName
        - dateOfBirth
        - phone
      properties:
        registrationNumber:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
          enum: [male, female, other]
        maritalStatus:
          type: string
          enum: [single, married, divorced, widowed]
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          type: string
        emergencyContact:
          type: object
          properties:
            name:
              type: string
            relationship:
              type: string
            phone:
              type: string
        guardian:
          type: object
          properties:
            name:
              type: string
            relationship:
              type: string
            phone:
              type: string
        academicInfo:
          type: object
          properties:
            career:
              type: string
            group:
              type: string
            semester:
              type: integer
        occupation:
          type: string

    # ==================== STUDENT SCHEMAS ====================
    Student:
      type: object
      description: Estudiante (paciente con número de matrícula)
      properties:
        id:
          type: string
          format: uuid
          description: ID del paciente/estudiante
        userId:
          type: string
          format: uuid
        patientType:
          type: string
        careerId:
          type: string
          format: uuid
        group:
          type: string
        trimester:
          type: integer
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            firstName:
              type: string
            lastName:
              type: string
            dateOfBirth:
              type: string
              format: date
            phone:
              type: string
            enrollmentNumber:
              type: string
              description: Número de matrícula del estudiante
            isActive:
              type: boolean
        career:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            code:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StudentDetails:
      type: object
      description: Información detallada del estudiante
      allOf:
        - $ref: '#/components/schemas/Student'
        - type: object
          properties:
            emergencyContacts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  relationship:
                    type: string
                  phone:
                    type: string
                  phoneSecondary:
                    type: string
                  priority:
                    type: integer

    # ==================== MEDICAL RECORD SCHEMAS ====================
    MedicalRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        chiefComplaint:
          type: string
          description: Motivo de consulta
        psychologicalHistory:
          type: string
        familyHistory:
          type: string
        personalHistory:
          type: string
        allergies:
          type: array
          items:
            type: string
        diagnoses:
          type: array
          items:
            $ref: '#/components/schemas/Diagnosis'
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MedicalRecordInput:
      type: object
      required:
        - patientId
        - chiefComplaint
      properties:
        patientId:
          type: string
          format: uuid
        chiefComplaint:
          type: string
        psychologicalHistory:
          type: string
        familyHistory:
          type: string
        personalHistory:
          type: string
        allergies:
          type: array
          items:
            type: string

    Diagnosis:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          description: Código DSM-5 o CIE-10/11
        classification:
          type: string
          enum: [DSM-5, ICD-10, ICD-11]
        name:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [mild, moderate, severe]
        diagnosedBy:
          type: string
          format: uuid
        diagnosedAt:
          type: string
          format: date-time

    DiagnosisInput:
      type: object
      required:
        - code
        - classification
        - name
      properties:
        code:
          type: string
        classification:
          type: string
          enum: [DSM-5, ICD-10, ICD-11]
        name:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [mild, moderate, severe]

    # ==================== APPOINTMENT SCHEMAS ====================
    Appointment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patientId:
          type: string
          format: uuid
        professionalId:
          type: string
          format: uuid
        type:
          type: string
          enum: [psychology, nursing, general]
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        duration:
          type: integer
          description: Duración en minutos
        status:
          type: string
          enum: [scheduled, completed, cancelled, no-show]
        reason:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppointmentInput:
      type: object
      required:
        - patientId
        - professionalId
        - type
        - date
        - startTime
      properties:
        patientId:
          type: string
          format: uuid
        professionalId:
          type: string
          format: uuid
        type:
          type: string
          enum: [psychology, nursing, general]
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        duration:
          type: integer
        reason:
          type: string
        notes:
          type: string

    # ==================== MEDICATION SCHEMAS ====================
    Medication:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        genericName:
          type: string
        category:
          type: string
        presentation:
          type: string
        concentration:
          type: string
        manufacturer:
          type: string
        requiresPrescription:
          type: boolean
        createdAt:
          type: string
          format: date-time

    MedicationInput:
      type: object
      required:
        - name
        - category
      properties:
        name:
          type: string
        genericName:
          type: string
        category:
          type: string
        presentation:
          type: string
        concentration:
          type: string
        manufacturer:
          type: string
        requiresPrescription:
          type: boolean

