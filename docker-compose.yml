version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: ehr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: ehr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ehr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ehr-network

  # API Service
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ehr-api
    restart: unless-stopped
    environment:
      # Server Configuration
      NODE_ENV: production
      PORT: 5000
      HOST: 0.0.0.0
      
      # Database Configuration
      DATABASE_URL: postgresql://admin:admin1234@db:5432/ehr_db?schema=public
      
      # JWT Configuration
      JWT_SECRET: your-secret-key-change-this-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your-refresh-secret-key-change-this-in-production
      JWT_REFRESH_EXPIRES_IN: 30d
      
      # CORS Configuration
      CORS_ORIGIN: http://localhost:5173
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      
      # Redis (optional - for caching)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      
      # Email Configuration (Nodemailer)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@example.com
      SMTP_PASS: your-app-password
      SMTP_FROM: noreply@ehr-system.com
      
      # File Upload
      MAX_FILE_SIZE: 10485760
      UPLOAD_PATH: ./uploads
      
      # Logging
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ehr-network
    command: >
      sh -c "npx prisma migrate deploy &&
             node dist/index.js"

  # Redis Service (optional - for caching)
  redis:
    image: redis:7-alpine
    container_name: ehr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ehr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  redis_data:
    driver: local

# Network definition
networks:
  ehr-network:
    driver: bridge
