services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: ehr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: ehr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ehr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
